<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>IndCivic Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>IndCivic Dashboard</h1>
        <p id="welcome"></p>

        <div id="admin-panel" style="display:none;">
            <h2>Admin Controls</h2>
            <p>Manage civic data, users, and reports.</p>
        </div>

        <div id="citizen-panel" style="display:none;">
            <h2>Citizen Resources</h2>
            <p>Access civic guides, events, and community tools.</p>
        </div>

        <button onclick="logout()">Logout</button>
    </div>

    <script>
        async function loadDashboard() {
            const token = localStorage.getItem("token");
            if (!token) {
                alert("Not authorized. Please log in.");
                window.location.href = "index.html";
                return;
            }

            const res = await fetch("http://localhost:5000/api/auth/dashboard", {
                headers: { "Authorization": "Bearer " + token }
            });

            const data = await res.json();
            document.getElementById("welcome").innerText = data.message;

            if (data.message.includes("Admin")) {
                document.getElementById("admin-panel").style.display = "block";
            } else {
                document.getElementById("citizen-panel").style.display = "block";
            }
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "index.html";
        }

        loadDashboard();
    </script>
</body>

</html>
